[pytest]
# Локальная конфигурация для разработки внутри `home-console-cli/`.
# Важно: при запуске `pytest` из этой директории pytest должен собирать ТОЛЬКО CLI-тесты,
# а не весь монорепозиторий (см. ../pytest.ini в корне workspace).
testpaths =
    tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -q
